name: Movie Shorts Bot (4/day)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Specific YouTube video URL (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  movie-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fontconfig fonts-dejavu-core

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load Credentials from Secrets
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          echo "$CLIENT_SECRET_JSON" > client_secret.json
          echo "$TOKEN_JSON" > token.json
          echo "Credentials loaded."

      - name: Run Movie Shorts Bot
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.video_url }}" ]; then
            python main.py --url "${{ github.event.inputs.video_url }}"
          else
            python main.py
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: movie-shorts-artifact
          path: downloads/final_video.mp4
          retention-days: 3

      - name: Commit History Update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scripts_history.txt clips_history.txt 2>/dev/null || true
          git commit -m "Update history [skip ci]" --allow-empty 2>/dev/null || true
          git push origin main 2>/dev/null || true

concurrency:
  group: movie-shorts
  cancel-in-progress: false
